name: Malware Static & AI Analysis Test

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libmagic1

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install python-magic yara-python pefile scikit-learn joblib

    - name: Step 1 - Run Static Analyzer
      run: |
        python analyzer.py analyzer.py --output report.json

    - name: Step 1.5 - Create Dummy AI Model
      run: |
        python ai_engine.py --create-dummy-model --model model_rf.pkl

    - name: Step 2 - Run AI Inference Engine & Fusion
      run: |
        python ai_engine.py --report report.json --model model_rf.pkl
