name: Malware Static & AI Analysis Test

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  analyze:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-magic-bin yara-python pefile scikit-learn joblib pyinstaller pandas

    - name: Step 0 - Build EXE from Python
      run: |
        pyinstaller --onefile sample.py
        Copy-Item -Path dist\sample.exe -Destination .

    - name: Step 1 - Run Static Analyzer
      run: |
        python analyzer.py sample.exe --output report.json

    - name: Step 1.5 - Train AI Model (Large Scale)
      run: |
        python train.py

    - name: Step 2 - Run AI Inference Engine & Fusion
      run: |
        python ai_engine.py --report report.json --model model_rf.pkl
