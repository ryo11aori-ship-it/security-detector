name: Malware Static & AI Analysis Test

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  analyze:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-magic-bin yara-python pefile scikit-learn joblib pandas pyinstaller

    - name: Build EXE from sample
      run: |
        pyinstaller --onefile sample.py
        Copy-Item -Path dist\sample.exe -Destination .

    - name: Run Static Analyzer
      run: |
        python analyzer.py sample.exe --output report.json

    - name: Setup Dummy Model for CI
      run: |
        python train.py

    - name: Run AI Inference Engine
      run: |
        python ai_engine.py --report report.json --target sample.exe --model model_rf.pkl --output ai_report.json

    - name: Show Reports
      run: |
        type report.json
        type ai_report.json

    - name: Upload Reports Artifact
      uses: actions/upload-artifact@v4
      with:
        name: malware-analysis-reports
        path: |
          report.json
          ai_report.json
