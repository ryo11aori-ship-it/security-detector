    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libmagic1

    - name: Check files (デバッグ用)
      run: |
        echo "=== 現在のディレクトリ位置 ==="
        pwd
        echo "=== 存在するファイル一覧 ==="
        ls -la

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
